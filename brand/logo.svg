<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 128" width="520" height="128" fill="none">
  <title>BEV Insights — horizontal lockup</title>
  <!-- Mark: scaled from the canonical 96x96 viewBox into a 96x96 region with 16px top/bottom padding. -->
  <g transform="translate(16, 16) scale(1.0)">
    <rect x="14" y="26" width="58" height="44" rx="8" stroke="#0E1116" stroke-width="5"/>
    <rect x="76" y="38" width="8" height="20" rx="2" fill="#0E1116"/>
    <path d="M22 54 L30 54 L34 42 L40 60 L46 38 L52 54 L64 54"
          stroke="#0A6CFF" stroke-width="4"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Wordmark: "BEV" bold + "insights" regular, accent on the second word.
       Inter, -0.02em tracking, baseline aligned with the optical center of the mark. -->
  <text x="128" y="78"
        font-family="Inter, system-ui, sans-serif"
        font-size="52" letter-spacing="-1.04"
        fill="#0E1116">
    <tspan font-weight="700">BEV</tspan>
    <tspan font-weight="400" fill="#0A6CFF" dx="10">insights</tspan>
  </text>
</svg>
