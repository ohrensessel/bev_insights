name: mutation

# Mutation testing is slow (~20 min for ~500 mutants on this codebase),
# so it doesn't run on every push / PR — only on explicit manual
# triggers via the Actions tab. The companion .gitea/workflows/mutation.yml
# does the same for the Gitea mirror.
on:
  workflow_dispatch:

jobs:
  mutmut:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt
          pip install "pytest-homeassistant-custom-component"

      - name: Run mutation tests
        # Mutation config (paths_to_mutate, also_copy, pytest_add_cli_args)
        # lives in [tool.mutmut] in pyproject.toml.
        run: mutmut run

      - name: Summarise mutation results
        if: always()
        run: |
          mutmut export-cicd-stats
          echo "::group::Surviving mutants"
          mutmut results | grep ": survived" || echo "No surviving mutants — perfect run."
          echo "::endgroup::"
          echo "::group::Summary"
          cat mutants/mutmut-cicd-stats.json
          echo "::endgroup::"

      - name: Upload mutmut stats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutmut-stats
          path: |
            mutants/mutmut-stats.json
            mutants/mutmut-cicd-stats.json
          if-no-files-found: ignore
