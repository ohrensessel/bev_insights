name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.15.12"

      - name: Run ruff
        run: ruff check custom_components tests

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt

      - name: Run mypy
        run: mypy

  pytest:
    name: "pytest (py${{ matrix.python-version }}, HA ${{ matrix.ha-target }})"
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        # Three HA targets:
        # - `minimum` exercises the floor declared in `hacs.json` so we
        #   notice if production code starts using newer APIs.
        # - `stable` tracks the latest released HA — what most users run.
        # - `dev` installs HA from `core@dev`; allowed to fail so it
        #   surfaces upcoming breakage without blocking PRs.
        include:
          # Pinned to 0.13.100 (HA ~2024.7), not the earlier 0.13.0:
          # - 0.13.0..~50 reference an `asyncio_legacy` submodule that
          #   wasn't packaged in those releases (transitional bug around
          #   pytest-asyncio's mode change in late 2023).
          # - HA 2024.1's transitive deps also pull numpy 1.23 which has
          #   no Python 3.12 wheels and can't build from source on 3.12.
          # 0.13.100 sidesteps both. The hacs.json `homeassistant` floor
          # is kept aligned with this pin so declared and tested minimums
          # match.
          # Python 3.11 was the HA-recommended Python at the 2024.7
          # release; our production code uses no 3.12-only syntax so it
          # stays compatible there.
          - python-version: "3.11"
            ha-target: minimum
            plugin-spec: "pytest-homeassistant-custom-component==0.13.100"
            install-dev-ha: false
            experimental: false
          - python-version: "3.12"
            ha-target: stable
            plugin-spec: "pytest-homeassistant-custom-component"
            install-dev-ha: false
            experimental: false
          - python-version: "3.13"
            ha-target: stable
            plugin-spec: "pytest-homeassistant-custom-component"
            install-dev-ha: false
            experimental: false
          - python-version: "3.14"
            ha-target: dev
            plugin-spec: "pytest-homeassistant-custom-component"
            install-dev-ha: true
            experimental: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install pytest plugin
        # setuptools needs to be modern enough that `pkgutil.ImpImporter`
        # (removed in Python 3.12) is no longer referenced — that lands in
        # setuptools 60. But it also needs to be old enough to still ship
        # `pkg_resources`, which setuptools 80 removed (May 2025). Older HA
        # versions on the `minimum` target still `import pkg_resources`,
        # so pin to the [60, 80) window.
        # `tzdata` ships the IANA timezone files as a wheel so the runner
        # doesn't have to have the system `tzdata` package — HA's tests
        # default the timezone to US/Pacific and fail with `Received
        # invalid time zone US/Pacific` otherwise.
        # `pytest-cov` is wired into pytest's addopts (pyproject.toml), so
        # it has to be present even on jobs that don't display coverage.
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools>=60,<80" wheel tzdata "pytest-cov>=5.0"
          pip install "${{ matrix.plugin-spec }}"

      - name: Override homeassistant with the dev branch
        if: matrix.install-dev-ha
        run: |
          pip install --upgrade --force-reinstall \
            "homeassistant @ git+https://github.com/home-assistant/core.git@dev"

      - name: Run pytest
        run: pytest -v
